<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#000" />
		<title>Offline — Jereko</title>
		<link rel="shortcut icon" href="/favicons/favicon.ico" type="image/x-icon" />
		<style>
			:root {
				color-scheme: light dark;
				--fg: #171717;
				--muted: #737373;
				--btn-bg: #171717;
				--btn-fg: #fafafa;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--fg: #fafafa;
					--muted: #a3a3a3;
					--btn-bg: #fafafa;
					--btn-fg: #171717;
				}
			}
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 1.5rem;
				font-family:
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					sans-serif;
				background: #fafafa;
				color: var(--fg);
			}
			@media (prefers-color-scheme: dark) {
				body {
					background: #0a0a0a;
				}
			}
			main {
				max-width: 28rem;
				text-align: center;
				display: flex;
				flex-direction: column;
				gap: 1rem;
			}
			h1 {
				margin: 0;
				font-size: 1.875rem;
				line-height: 1.2;
			}
			p {
				margin: 0;
				color: var(--muted);
				line-height: 1.5;
			}
			button,
			a {
				font: inherit;
			}
			button {
				border: 0;
				border-radius: 0.5rem;
				padding: 0.5rem 1rem;
				background: var(--btn-bg);
				color: var(--btn-fg);
				cursor: pointer;
			}
			a {
				color: var(--muted);
				text-decoration: underline;
				text-underline-offset: 4px;
			}
			a:hover {
				color: var(--fg);
			}
		</style>
	</head>
	<body>
		<main>
			<h1>You're offline</h1>
			<p>Check your connection and try again. When you're back online, refresh the page.</p>
			<button type="button" onclick="window.location.reload()">Retry</button>
			<a href="/">Back to home</a>
		</main>
	</body>
</html>
